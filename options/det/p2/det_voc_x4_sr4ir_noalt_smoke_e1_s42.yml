# P2 run8: SR4IR w/o alternate training (ablation): synchronous joint update via alternate_training=false
# changes: batch 16->2 (+grad_accum 4), amp on, epoch 30->10, warmup 3->1,
#          scheduler periods [2,27]->[1,9], seed 100->42, num_threads 16->4
name: det_voc_x4_sr4ir_noalt_smoke_e1_s42
model_type: sr4ir_det
num_threads: 4
print_freq: 100  # unit: iter
manual_seed: 42
scale: 4
deterministic: true

# data and augmentation
data:
  path: datasets/VOC_COCO
  format: coco
  aspect_ratio_group_factor : 3
  data_augmentation: hflip
  is_voc: true

# network specs
network_sr:
  name: edsr
  n_blocks: 16
  n_feats: 64
network_det:
  name: fasterrcnn_mobilenet_v3_large_fpn
  weights_backbone: MobileNet_V3_Large_Weights.IMAGENET1K_V1
  num_classes: 21

# path for pretrained model
path:
  network_sr: experiments/pretrained_models/edsr_baseline_x4-6b446fab.pt
  network_det: ~

# training config
train:
  batch_size: 2
  grad_accum: 4  # effective batch 8
  amp: true
  epoch: 1
  save_freq: 1  # unit: epoch
  eval_freq: 1
  warmup_epoch: 0
  alternate_training: false

  # optimizer
  optim_sr:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.999]
  optim_det:
    type: SGD
    lr: !!float 2e-2
    momentum: 0.9
    weight_decay: !!float 1e-4

  # scheduler
  scheduler_sr:
    type: CosineAnnealingRestartLR
    periods: [1]
    restart_weights: [1]
    eta_min: !!float 1e-6
  scheduler_det:
    type: CosineAnnealingRestartLR
    periods: [1]
    restart_weights: [1]
    eta_min: !!float 1e-4

  # phase 1 losses
  pixel_opt:
    type: L1Loss
    loss_weight: !!float 1.0
    reduction: mean
  tdp_opt:
    type: FeatureLoss
    loss_weight: !!float 1.0
    criterion: l1
    layer_weights:
      '0': 0.5
      '1': 0.5

  # phase 2 losses
  det_sr_opt:
    type: DETLoss
    loss_weight: !!float 0.34
  det_hr_opt:
    type: DETLoss
    loss_weight: !!float 0.34
  det_cqmix_opt:
    type: DETLoss
    loss_weight: !!float 0.34

# testing config
test:
  batch_size: 1
  visualize_first_n: 10

# DDP setting
dist_url: env:://
